- defaults:
    link:
        create: true
- clean:
    ~/:
      force: true
    ~/.config:
      force: true
      recursive: true
- link:
    ~/.bash_profile: bash/bash_profile
    ~/.bashrc: bash/bashrc
    ~/.bash_logout: bash/bash_logout
    ~/.config/kitty/kitty.conf: kitty/kitty.conf
    ~/.config/sway/:
      glob: true
      path: sway/*
    ~/.config/waybar/config:
      path: waybar/config.json
    ~/.config/waybar/style.css:
      path: waybar/style.css
    ~/.local/share/rofi/themes/nord.rasi:
      path: rofi/nord.rasi
    ~/.config/electron-flags.conf:
      path: ./wayland/electron-flags.conf
    ~/.xinitrc:
      path: xinitrc
- shell:
    - command: set path '/etc/environment'; sudo rm -f $path; for env in $(fd '^env$');echo -e "\n# From $env" | sudo tee -a $path && cat $env | sudo tee -a $path;end; 
    - command: sudo cp './virt/autostart/windows-virt.service' '/usr/lib/systemd/system/'
- yay:
    - visual-studio-code-bin
    - openjdk-src
    - openjdk-doc
    - jdk-openjdk
    - ttf-nerd-fonts-symbols 
    - anki-bin
    - xmind
    - typora-free
    - intellij-idea-ultimate-edition
    - texlive-bin
    - texlive-core
    - texlive-latexextra
    - texlive-langchinese
    - texlive-bibtexextra 
    - tllocalmgr-git

