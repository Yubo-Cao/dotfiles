- defaults:
    link:
      create: true
- clean:
    ~/:
      force: true
    ~/.config:
      force: true
      recursive: true
- link:
    ~/.bash_profile: bash/bash_profile
    ~/.bashrc: bash/bashrc
    ~/.bash_logout: bash/bash_logout
    ~/.config/kitty/kitty.conf: kitty/kitty.conf
    ~/.config/sway/:
      glob: true
      path: sway/*
    ~/.config/waybar/config:
      path: waybar/config.json
    ~/.config/waybar/style.css:
      path: waybar/style.css
    ~/.local/share/rofi/themes/nord.rasi:
      path: rofi/nord.rasi
    ~/.config/electron-flags.conf:
      path: ./wayland/electron-flags.conf
    ~/.xinitrc:
      path: xinitrc
    ~/.config/zathura/zathurac:
      path: /home/yubo/config/zathura/zathurarc
    ~/indentconfig.yaml:
      path: /home/yubo/config/latex/mysettings.yaml
    ~/.zshrc:
      path: /home/yubo/config/zsh/zshrc
- shell:
    - command: dst='/etc/environment'; sudo rm -f $dst; for env in $(fd '^env$'); do cat <(echo -e "\n# From $env") $env | sudo tee -a $dst; done
    - command: sudo cp './virt/autostart/windows-virt.service' '/usr/lib/systemd/system/'
    - command: for pkg in $(fd pkgs.yaml); do sudo python installer.py $pkg; done;
# Necesssary basic softwares
- yay:
    - visual-studio-code-bin
    - openjdk-src
    - openjdk-doc
    - jdk-openjdk
    - xmind
    - jetbrains-toolbox
    - fd
    - ripgrep
    - ark
    - unrar
    - unarchiver
    - lzop
    - lrzip
    - dolphin
    - gwenview
    - git
    - ntfs-3g
    - discord
    - oh-my-zsh-git
    - rofi
    - typora-free
