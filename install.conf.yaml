- defaults:
    link:
      create: true
- clean:
    ~/:
      force: true
    ~/.config:
      force: true
      recursive: true
- link:
    ~/.bash_profile: bash/bash_profile
    ~/.bashrc: bash/bashrc
    ~/.bash_logout: bash/bash_logout
    ~/.config/kitty/kitty.conf: kitty/kitty.conf
    ~/.config/sway/:
      glob: true
      path: sway/*
    ~/.config/waybar/config:
      path: waybar/config.json
    ~/.config/waybar/style.css:
      path: waybar/style.css
    ~/.local/share/rofi/themes/nord.rasi:
      path: rofi/nord.rasi
    ~/.config/electron-flags.conf:
      path: ./wayland/electron-flags.conf
    ~/.config/zathura/zathurac:
      path: zathura/zathurarc
    ~/indentconfig.yaml:
      path: latex/indentconfig.yaml
    ~/.zshrc:
      path: zsh/zshrc
    ~/.p10k.zsh:
      path: zsh/p10k.zsh
    ~/.config/rofi/config.rasi:
      path: rofi/config.rasi
    ~/.config/gtk-3.0/settings.ini:
      path: theme/gtk/settings.ini
    ~/.gtkrc-2.0:
      path: theme/gtk/gtkrc-2.0
    ~/.icons/default/index.theme:
      path: theme/gtk/index.theme
    ~/.config/xsettingsd/xsettingsd.conf:
      path: theme/gtk/xsettingsd.conf
    ~/.config/fcitx5:
      glob: true
      path: fcitx5/*
      exclude: env
- shell:
    - command: dst='/etc/environment'; sudo rm -f $dst; for env in $(fd '^env$'); do cat <(echo -e "\n# From $env") $env | sudo tee -a $dst; done
      description: "Environment File Generator"
    - command: sudo cp './virt/autostart/windows-virt.service' '/usr/lib/systemd/system/'
      description: "Windows Virtualization Service"
    - command: for pkg in $(fd pkgs.yaml); do sudo python ./plugin/package.py $pkg; done;
      stdout: true
      description: "Install pkgs.yaml in subfolders"
- package:
    - ide:
        - visual-studio-code-bin
        - jetbrains-toolbox
    - java:
        - openjdk-src
        - openjdk-doc
        - jdk-openjdk
    - rust-cli:
        - fd
        - ripgrep
    - decompresser:
        - ark
        - unrar
        - unarchiver
        - lzop
        - lrzip
    - notebook:
        - xmind
        - typora-free
    - common:
        - dolphin # File Explorer
        - gwenview # Image Viewer
        - ntfs-3g
    - devel:
        - tldr
        - git
    - backup:
        - timeshift
        - grub-btrfs
    - discord
