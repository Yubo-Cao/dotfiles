font_family      Fira Code Retina
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size	 11.0
disable_ligatures never

# Powerline
symbol_map U+E5FA-U+E62B,U+E700-U+E7C5,U+F000-U+F2E0,U+E200-U+E2A9,U+E0A3,U+E0B4-U+E0C8,U+E0CA,U+E0CC-U+E0D2,U+E0D4,U+f500-U+fd46,U+2570 MesloLGS NF Regular

# Tab
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+shift+w close_os_window
map ctrl+f next_tab
map ctrl+b previous_tab
map ctrl+shift+l next_layout
background #f8f8f8

# Cell Configuration
adjust_line_height	1
adjust_column_width	1

# Padding
window_padding_width	10

# Tab Bar  
tab_bar_edge		top
active_tab_foreground	#2e3440
active_tab_background	#88c0d0
active_tab_font_style	normal
inactive_tab_foreground	#d8dee9
inactive_tab_background	#4c566a

# Cursor
cursor			#d8dee9
cursor_shape		block
cursor_blink_interval	0

# Colors
background #212733
foreground #d9d7ce
cursor #ffcc66
selection_background #343f4c
color0 #191e2a
color8 #686868
color1 #ed8274
color9 #f28779
color2  #a6cc70
color10 #bae67e
color3  #fad07b
color11 #ffd580
color4  #6dcbfa
color12 #73d0ff
color5  #cfbafa
color13 #d4bfff
color6  #90e1c6
color14 #95e6cb
color7  #c7c7c7
color15 #ffffff
selection_foreground #212733
